# Outdoor Campus preset for nav2_config
#
# Tuned for outdoor navigation on paved campus paths, plazas, and
# pedestrian zones. Terrain is mostly flat with occasional curbs, benches,
# cyclists, and pedestrians. GPS / AMCL via lidar.
#
# Key choices:
#   - Moderate speed (0.6 m/s) balancing efficiency and safety outdoors.
#   - Larger local costmap (5 m) to capture obstacles farther ahead.
#   - More AMCL particles to handle featureless outdoor stretches.
#   - Higher inflation radius to account for wider outdoor robot footprint.
#   - Looser goal tolerance (0.20 m) because GPS drift reduces positioning precision.

controller_server:
  ros__parameters:
    controller_frequency: 15.0
    failure_tolerance: 1.0
    FollowPath.desired_linear_vel: 0.6
    FollowPath.lookahead_dist: 0.8
    FollowPath.min_lookahead_dist: 0.4
    FollowPath.max_lookahead_dist: 1.5
    FollowPath.use_collision_detection: true
    FollowPath.max_allowed_time_to_collision_up_to_carrot: 2.0
    goal_checker.xy_goal_tolerance: 0.20
    goal_checker.yaw_goal_tolerance: 0.25
    progress_checker.movement_time_allowance: 20.0
    progress_checker.required_movement_radius: 0.5

local_costmap:
  ros__parameters:
    update_frequency: 15.0
    width: 5
    height: 5
    resolution: 0.10
    robot_radius: 0.35
    inflation_layer.inflation_radius: 0.65
    inflation_layer.cost_scaling_factor: 2.0

global_costmap:
  ros__parameters:
    update_frequency: 1.0
    resolution: 0.10
    robot_radius: 0.35
    inflation_layer.inflation_radius: 0.65
    inflation_layer.cost_scaling_factor: 2.0

amcl:
  ros__parameters:
    min_particles: 1000
    max_particles: 5000
    transform_tolerance: 0.3

velocity_smoother:
  ros__parameters:
    smoothing_frequency: 15.0
    scale_velocities: true
