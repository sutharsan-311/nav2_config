# Simulation (TurtleBot3) preset for nav2_config
#
# Conservative defaults tuned for TurtleBot3 Waffle in Gazebo with the
# standard Nav2 simulation environment (turtlebot3_world or tb3_house).
# These values closely match the official Nav2 TurtleBot3 nav2_params.yaml.
#
# Key choices:
#   - Low speed (0.26 m/s) matching TurtleBot3 Waffle's safe operating limit.
#   - Small robot_radius (0.22 m) matches the Waffle footprint.
#   - Small inflation radius for navigating the tight nav2 demo environments.
#   - Default AMCL particles sufficient for structured simulation maps.
#   - Short movement_time_allowance since simulation obstacles rarely persist.

controller_server:
  ros__parameters:
    controller_frequency: 20.0
    failure_tolerance: 0.3
    FollowPath.desired_linear_vel: 0.26
    FollowPath.lookahead_dist: 0.6
    FollowPath.min_lookahead_dist: 0.3
    FollowPath.max_lookahead_dist: 0.9
    FollowPath.use_collision_detection: true
    FollowPath.max_allowed_time_to_collision_up_to_carrot: 1.0
    goal_checker.xy_goal_tolerance: 0.25
    goal_checker.yaw_goal_tolerance: 0.25
    progress_checker.movement_time_allowance: 10.0
    progress_checker.required_movement_radius: 0.3

local_costmap:
  ros__parameters:
    update_frequency: 20.0
    width: 3
    height: 3
    resolution: 0.05
    robot_radius: 0.22
    inflation_layer.inflation_radius: 0.55
    inflation_layer.cost_scaling_factor: 3.0

global_costmap:
  ros__parameters:
    update_frequency: 1.0
    resolution: 0.05
    robot_radius: 0.22
    inflation_layer.inflation_radius: 0.55
    inflation_layer.cost_scaling_factor: 3.0

amcl:
  ros__parameters:
    min_particles: 500
    max_particles: 2000
    transform_tolerance: 0.1

velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0
    scale_velocities: false
