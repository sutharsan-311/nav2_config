# Open Warehouse preset for nav2_config
#
# Tuned for high-throughput autonomous transport on wide, clear lanes
# in a semi-static warehouse environment. Obstacles are mostly static
# (shelving, pallets) with predictable forklift paths.
#
# Key choices:
#   - Higher speed (0.8 m/s) for efficiency on straight runs.
#   - Longer lookahead for smooth path following in open space.
#   - Larger local costmap to detect obstacles farther ahead.
#   - Slightly looser goal tolerance (0.15 m) is sufficient for shelf approach.
#   - Moderate inflation to leave clearance for shelving edges.

controller_server:
  ros__parameters:
    controller_frequency: 20.0
    failure_tolerance: 0.5
    FollowPath.desired_linear_vel: 0.8
    FollowPath.lookahead_dist: 1.0
    FollowPath.min_lookahead_dist: 0.5
    FollowPath.max_lookahead_dist: 1.5
    FollowPath.use_collision_detection: true
    FollowPath.max_allowed_time_to_collision_up_to_carrot: 2.0
    goal_checker.xy_goal_tolerance: 0.15
    goal_checker.yaw_goal_tolerance: 0.20
    progress_checker.movement_time_allowance: 15.0
    progress_checker.required_movement_radius: 0.5

local_costmap:
  ros__parameters:
    update_frequency: 20.0
    width: 5
    height: 5
    resolution: 0.05
    robot_radius: 0.30
    inflation_layer.inflation_radius: 0.55
    inflation_layer.cost_scaling_factor: 2.5

global_costmap:
  ros__parameters:
    update_frequency: 2.0
    resolution: 0.05
    robot_radius: 0.30
    inflation_layer.inflation_radius: 0.55
    inflation_layer.cost_scaling_factor: 2.5

amcl:
  ros__parameters:
    min_particles: 500
    max_particles: 2000
    transform_tolerance: 0.2

velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0
    scale_velocities: true
