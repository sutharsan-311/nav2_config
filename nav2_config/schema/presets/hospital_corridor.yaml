# Hospital Corridor preset for nav2_config
#
# Tuned for slow, precise navigation in narrow hospital hallways
# where pedestrians (staff, patients, visitors) may cross at any time.
#
# Key choices:
#   - Low speed (0.3 m/s) to ensure safe interaction with people.
#   - Short lookahead for tight corridor turns.
#   - Wide inflation radius relative to robot size for generous clearance.
#   - Tight goal tolerance for precise docking at nursing stations.
#   - Long movement_time_allowance because corridors may be temporarily blocked.

controller_server:
  ros__parameters:
    controller_frequency: 20.0
    failure_tolerance: 1.0
    FollowPath.desired_linear_vel: 0.3
    FollowPath.lookahead_dist: 0.4
    FollowPath.min_lookahead_dist: 0.3
    FollowPath.max_lookahead_dist: 0.6
    FollowPath.use_collision_detection: true
    FollowPath.max_allowed_time_to_collision_up_to_carrot: 1.0
    goal_checker.xy_goal_tolerance: 0.10
    goal_checker.yaw_goal_tolerance: 0.15
    progress_checker.movement_time_allowance: 30.0
    progress_checker.required_movement_radius: 0.3

local_costmap:
  ros__parameters:
    update_frequency: 20.0
    width: 3
    height: 3
    resolution: 0.05
    robot_radius: 0.22
    inflation_layer.inflation_radius: 0.55
    inflation_layer.cost_scaling_factor: 3.0

global_costmap:
  ros__parameters:
    update_frequency: 2.0
    resolution: 0.05
    robot_radius: 0.22
    inflation_layer.inflation_radius: 0.55
    inflation_layer.cost_scaling_factor: 3.0

amcl:
  ros__parameters:
    min_particles: 1000
    max_particles: 4000
    transform_tolerance: 0.2

velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0
    scale_velocities: true
