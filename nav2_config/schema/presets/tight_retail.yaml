# Tight Retail preset for nav2_config
#
# Tuned for very slow, high-precision navigation in congested retail
# environments: narrow product aisles (< 1.5 m wide), frequent cross-traffic
# from shoppers and staff, tight turns at aisle ends.
#
# Key choices:
#   - Very low speed (0.2 m/s) so the robot can stop immediately for shoppers.
#   - Short lookahead (0.35 m) for tight aisle turns without cutting corners.
#   - Very tight goal tolerance (0.08 m) for precise shelf-face positioning.
#   - High inflation cost_scaling_factor to aggressively penalise paths near walls.
#   - Long movement_time_allowance because shoppers frequently block aisles briefly.
#   - Small local costmap (3 m) is sufficient for slow-speed obstacle avoidance.

controller_server:
  ros__parameters:
    controller_frequency: 20.0
    failure_tolerance: 2.0
    FollowPath.desired_linear_vel: 0.20
    FollowPath.lookahead_dist: 0.35
    FollowPath.min_lookahead_dist: 0.25
    FollowPath.max_lookahead_dist: 0.50
    FollowPath.use_collision_detection: true
    FollowPath.max_allowed_time_to_collision_up_to_carrot: 0.8
    goal_checker.xy_goal_tolerance: 0.08
    goal_checker.yaw_goal_tolerance: 0.10
    progress_checker.movement_time_allowance: 45.0
    progress_checker.required_movement_radius: 0.2

local_costmap:
  ros__parameters:
    update_frequency: 20.0
    width: 3
    height: 3
    resolution: 0.05
    robot_radius: 0.22
    inflation_layer.inflation_radius: 0.45
    inflation_layer.cost_scaling_factor: 4.5

global_costmap:
  ros__parameters:
    update_frequency: 2.0
    resolution: 0.05
    robot_radius: 0.22
    inflation_layer.inflation_radius: 0.45
    inflation_layer.cost_scaling_factor: 4.5

amcl:
  ros__parameters:
    min_particles: 1000
    max_particles: 3000
    transform_tolerance: 0.2

velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0
    scale_velocities: true
